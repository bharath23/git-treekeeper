name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goos: [linux, darwin]
        goarch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.1"

      - name: Build binary
        env:
          VERSION: ${{ github.ref_name }}
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          mkdir -p build
          CGO_ENABLED=0 go build -ldflags "-X github.com/bharath23/git-treekeeper/cmd.version=$VERSION" -o build/git-tk-$VERSION-$GOOS-$GOARCH .
          shasum -a 256 build/git-tk-$VERSION-$GOOS-$GOARCH > build/git-tk-$VERSION-$GOOS-$GOARCH.sha256

      - name: Upload build artifacts
        uses: actions/upload-artifact@v6
        with:
          name: release-assets-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            build/git-tk-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}
            build/git-tk-${{ github.ref_name }}-${{ matrix.goos }}-${{ matrix.goarch }}.sha256

  release:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6
        with:
          pattern: release-assets-*
          merge-multiple: true
          path: dist

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: dist/*
          generate_release_notes: true
