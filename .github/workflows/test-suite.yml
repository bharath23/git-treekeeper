name: Test Suite

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        go-version: [1.26.1]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ matrix.go-version }}

      - name: Run Test Suite
        run: make test-ci

      - name: Upload test log
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: test-suite-output.json
          path: test.json
